run-name: "Build: ${{ inputs.package || 'auto-detect' }}"
name: Build and Publish Packages

on:
  push:
    branches: [main]
    paths: ["packages/**"]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to build (e.g. cjson/1.8.0, empty = all changed)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: detect
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            echo "packages=[\"${{ inputs.package }}\"]" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 -- packages/ 2>/dev/null | cut -d/ -f2,3 | sort -u | while read pkg; do
              if [ -f "packages/$pkg/sea.toml" ]; then
                echo "\"$pkg\""
              fi
            done | paste -sd,)
            if [ -z "$CHANGED" ]; then
              echo "packages=[]" >> $GITHUB_OUTPUT
            else
              echo "packages=[$CHANGED]" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install sea
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Resolve the latest release tag using authenticated API to avoid rate limits
          SEA_VERSION=$(curl -sSf -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/rtorr/sea/releases/latest | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Installing sea $SEA_VERSION"
          OS=$(uname -s | tr A-Z a-z)
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
          esac
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -sSfL -o sea.zip "https://github.com/rtorr/sea/releases/download/${SEA_VERSION}/sea-windows-${ARCH}.zip"
            unzip -o sea.zip
            mkdir -p "$HOME/bin"
            mv sea.exe "$HOME/bin/"
            echo "$HOME/bin" >> $GITHUB_PATH
          else
            curl -sSfL "https://github.com/rtorr/sea/releases/download/${SEA_VERSION}/sea-${OS}-${ARCH}.tar.gz" | tar xz
            sudo mv sea /usr/local/bin/
          fi
          sea version

      - name: Cache sea packages
        uses: actions/cache@v4
        with:
          path: ~/.sea/cache
          key: sea-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles(format('packages/{0}/sea.toml', matrix.package)) }}
          restore-keys: |
            sea-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure registry
        shell: bash
        run: |
          mkdir -p ~/.sea
          printf '[[remotes]]\nname = "sea-packages"\ntype = "github-releases"\nurl = "rtorr/sea-packages"\ntoken_env = "GITHUB_TOKEN"\n' > ~/.sea/config.toml
          cat ~/.sea/config.toml

      - name: Set up SSL for Git Bash curl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Git Bash's curl may have outdated CA certs. Point it at the system store.
          $caBundle = "C:\Program Files\Git\mingw64\etc\ssl\certs\ca-bundle.crt"
          if (Test-Path $caBundle) {
            echo "CURL_CA_BUNDLE=$caBundle" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          # Also ensure curl from system PATH is used (not Git Bash's)
          $systemCurl = (Get-Command curl.exe -ErrorAction SilentlyContinue).Source
          if ($systemCurl) {
            echo "Using system curl: $systemCurl"
          }

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sea build

      - name: Publish package
        working-directory: packages/${{ matrix.package }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --skip-verify because the previous version may have been published
          # from a different platform with different symbols
          sea publish --registry sea-packages --skip-verify || echo "::warning::Publish failed (asset may already exist for this ABI tag)"

      - name: Show result
        shell: bash
        run: |
          NAME=$(grep '^name = ' packages/${{ matrix.package }}/sea.toml | head -1 | awk -F'"' '{print $2}')
          VER=$(grep '^version = ' packages/${{ matrix.package }}/sea.toml | head -1 | awk -F'"' '{print $2}')
          ABI=$(sea profile list 2>&1 | grep 'ABI Tag' | awk '{print $NF}')
          echo "Published: $NAME@$VER ($ABI)"
