name: Build and Publish Packages

on:
  push:
    branches: [main]
    paths: ["packages/**"]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to build (e.g. cjson/1.8.0, empty = all changed)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: detect
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            echo "packages=[\"${{ inputs.package }}\"]" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 -- packages/ 2>/dev/null | cut -d/ -f2,3 | sort -u | while read pkg; do
              if [ -f "packages/$pkg/sea.toml" ]; then
                echo "\"$pkg\""
              fi
            done | paste -sd,)
            if [ -z "$CHANGED" ]; then
              echo "packages=[]" >> $GITHUB_OUTPUT
            else
              echo "packages=[$CHANGED]" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install sea
        shell: bash
        run: |
          # Map uname to release asset names
          OS=$(uname -s | tr A-Z a-z)
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
          esac

          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -sSfL -o sea.zip "https://github.com/rtorr/sea/releases/latest/download/sea-windows-${ARCH}.zip"
            unzip -o sea.zip
            mkdir -p "$HOME/bin"
            mv sea.exe "$HOME/bin/"
            echo "$HOME/bin" >> $GITHUB_PATH
          else
            curl -sSfL "https://github.com/rtorr/sea/releases/latest/download/sea-${OS}-${ARCH}.tar.gz" | tar xz
            sudo mv sea /usr/local/bin/
          fi
          sea version

      - name: Configure registry
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.sea
          cat > ~/.sea/config.toml <<'TOML'
          [[remotes]]
          name = "sea-packages"
          type = "github-releases"
          url = "rtorr/sea-packages"
          token_env = "GITHUB_TOKEN"
          TOML
          # Remove leading whitespace from heredoc
          sed -i.bak 's/^          //' ~/.sea/config.toml && rm -f ~/.sea/config.toml.bak

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only install if there are dependencies
          if grep -q '\[dependencies\]' sea.toml 2>/dev/null; then
            sea install || echo "Warning: dependency install failed (may be first build)"
          fi

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sea build

      - name: Publish package
        working-directory: packages/${{ matrix.package }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sea publish --registry sea-packages --skip-verify

      - name: Show result
        shell: bash
        run: |
          NAME=$(grep '^name = ' packages/${{ matrix.package }}/sea.toml | head -1 | awk -F'"' '{print $2}')
          VER=$(grep '^version = ' packages/${{ matrix.package }}/sea.toml | head -1 | awk -F'"' '{print $2}')
          echo "Published: $NAME@$VER ($(sea profile list 2>&1 | grep 'ABI Tag' | awk '{print $NF}'))"
