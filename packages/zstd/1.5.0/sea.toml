[package]
name = "zstd"
version = "1.5.0"
kind = "source"

[build]
subdir = "build/cmake"
cmake_args = ["-DZSTD_BUILD_PROGRAMS=OFF", "-DZSTD_BUILD_TESTS=OFF", "-DZSTD_BUILD_CONTRIB=OFF"]

[build.source]
url = "https://github.com/facebook/zstd/archive/refs/tags/v1.5.6.tar.gz"

[publish]
registry = "sea-packages"
include = ["include/**", "lib/**", "bin/**", "share/**", "LICENSE", "COPYING"]
