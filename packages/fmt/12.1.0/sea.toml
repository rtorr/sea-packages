[package]
name = "fmt"
version = "12.1.0"
kind = "source"

[build]
cmake_args = ["-DFMT_DOC=OFF", "-DFMT_TEST=OFF", "-DCMAKE_POSITION_INDEPENDENT_CODE=ON"]

[build.source]
url = "https://github.com/fmtlib/fmt/archive/refs/tags/12.1.0.tar.gz"

[publish]
registry = "sea-packages"
include = ["include/**", "lib/**", "bin/**", "share/**"]
