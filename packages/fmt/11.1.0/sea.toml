[package]
name = "fmt"
version = "11.1.0"
kind = "source"
description = "A modern formatting library for C++"

[build]
cmake_args = ["-DFMT_DOC=OFF", "-DFMT_TEST=OFF"]

[build.source]
url = "https://github.com/fmtlib/fmt/archive/refs/tags/11.1.4.tar.gz"

[publish]
registry = "sea-packages"
include = ["include/**", "lib/**"]
