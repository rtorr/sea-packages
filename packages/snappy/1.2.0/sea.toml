[package]
name = "snappy"
version = "1.2.0"
kind = "source"

[build]
script = "build.sh"
cmake_args = ["-DSNAPPY_BUILD_TESTS=OFF", "-DSNAPPY_BUILD_BENCHMARKS=OFF"]

[build.source]
url = "https://github.com/google/snappy/archive/refs/tags/1.2.1.tar.gz"

[publish]
registry = "sea-packages"
include = ["include/**", "lib/**", "bin/**", "share/**"]
